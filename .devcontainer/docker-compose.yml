services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_HOME: /opt/android-sdk
      PUB_CACHE: /home/vscode/.pub-cache
      DISPLAY: ${DISPLAY:-:0}
      GDK_BACKEND: x11
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
      NO_AT_BRIDGE: "1"
      QT_X11_NO_MITSHM: "1"
    gpus: all
    ports:
      - "9100:9100"
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix
      - flutter-pub-cache:/home/vscode/.pub-cache
      - flutter-gradle-cache:/home/vscode/.gradle
      - flutter-android-cache:/home/vscode/.android
    command: sleep infinity

volumes:
  flutter-pub-cache:
  flutter-gradle-cache:
  flutter-android-cache:
