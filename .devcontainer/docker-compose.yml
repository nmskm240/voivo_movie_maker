services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - flutter-pub-cache:/home/vscode/.pub-cache
      - flutter-gradle-cache:/home/vscode/.gradle
      - flutter-android-cache:/home/vscode/.android
    environment:
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_HOME: /opt/android-sdk
      CHROME_EXECUTABLE: /usr/bin/google-chrome
      PUB_CACHE: /home/vscode/.pub-cache
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9100:9100"
    command: sleep infinity

volumes:
  flutter-pub-cache:
  flutter-gradle-cache:
  flutter-android-cache:
